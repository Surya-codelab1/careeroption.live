<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Header Styles -->
    <link rel="stylesheet" href="CSS/header-styles.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header" id="header">
        <nav class="nav container" aria-label="Main navigation">
            <div class="nav__logo">
                <a href="/">CareerOption.Live</a>
            </div>
            
            <ul class="nav__menu" id="navMenu">
                <button class="nav__close" id="navClose" aria-label="Close navigation menu">
                    <i class="fas fa-times"></i>
                </button>
                <li class="nav__item">
                    <a href="/" class="nav__link">Home</a>
                </li>
                <li class="nav__item">
                    <a href="career-roadmap.html" class="nav__link active">Career Roadmap</a>
                </li>
                <li class="nav__item">
                    <a href="About.html" class="nav__link">About</a>
                </li>
                <li class="nav__item">
                    <a href="contact.html" class="nav__link">Contact Us</a>
                </li>
            </ul>
            
            <div class="nav__actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation menu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Header Script -->
    <script src="JS/header-script.js"></script>
</body>
</html>
